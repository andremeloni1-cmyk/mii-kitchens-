<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4f3f3" />
<title>Mii Kitchens</title>
<style>
  :root{
    --bg:#f4f3f3; --card:#ffffff; --card2:#f6f5f6; --ink:#1c1c1e; --muted:#8a8a8e;
    --line:#e9e8e9; --accent:#d9541e; --accent2:#c2461a; --green:#2ea05c; --amber:#c17d10;
    --dark:#1c1c1e; --pink:#ef6d6d; --blue:#4a90d9; --teal:#2fb9a2; --gold:#e8934a;
    --shadow:0 8px 24px rgba(30,25,25,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"SF Pro Display",system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  body{padding-bottom:96px;max-width:520px;margin:0 auto;position:relative;min-height:100vh}
  .wrap{padding:14px 16px 0}
  h1{font-size:30px;font-weight:800;letter-spacing:-.5px;margin:2px 0 2px}
  h2{font-size:22px;font-weight:800;letter-spacing:-.3px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:15px;margin:0 0 14px}
  .muted{color:var(--muted)}
  .card{background:var(--card);border-radius:22px;padding:16px 18px;box-shadow:var(--shadow);margin:12px 0}
  .row{display:flex;gap:10px;align-items:center}
  .spacer{flex:1}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
  .pill{border-radius:999px;padding:9px 16px;font-weight:600;font-size:14px;background:var(--card);
    box-shadow:var(--shadow);white-space:nowrap}
  .pill.on{background:var(--ink);color:#fff}
  .pill.accent.on{background:var(--accent);color:#fff}
  /* header */
  .head{display:flex;align-items:center;gap:12px;margin:6px 0 14px}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;letter-spacing:-1px;box-shadow:var(--shadow)}
  .head .t{flex:1;min-width:0}
  .icoBtn{width:46px;height:46px;border-radius:14px;background:var(--card);box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;font-size:20px}
  .icoBtn.accent{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  /* run sheet banner */
  .banner{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:22px;
    padding:18px 20px;display:flex;align-items:center;box-shadow:0 10px 24px rgba(197,70,26,.28);margin:4px 0 14px}
  .banner b{font-size:19px;font-weight:800}
  .banner .s{opacity:.9;font-size:14px;margin-top:2px}
  /* stat cards */
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0}
  .stat{background:var(--card);border-radius:18px;padding:16px 10px;text-align:center;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:800}
  .stat .l{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-top:2px}
  .stat.dark{background:var(--dark);color:#fff}
  .stat.dark .l{color:#b9b9bd}
  .wide{width:100%;background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;margin:10px 0}
  .search{width:100%;background:var(--card);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:10px;color:var(--muted);font-size:16px;margin:10px 0}
  .filters{display:flex;gap:9px;overflow-x:auto;padding:4px 0 10px;-ms-overflow-style:none;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  /* job card */
  .job{background:var(--card);border-radius:22px;padding:16px 18px;box-shadow:var(--shadow);margin:12px 0}
  .job h3{font-size:19px;font-weight:800;margin:0 0 3px;letter-spacing:-.3px}
  .job .meta{color:var(--muted);font-size:14px;margin:0 0 10px}
  .job .line{color:var(--muted);font-size:14px;display:flex;align-items:center;gap:7px;margin:4px 0}
  .badge{font-size:12px;font-weight:700;border-radius:999px;padding:5px 12px;border:1.5px solid}
  .b-prog{color:var(--amber);border-color:#e2c98a;background:#fdf7ea}
  .b-conf{color:var(--green);border-color:#a9dcc0;background:#eefaf2}
  .b-sched{color:var(--blue);border-color:#aecdf0;background:#eef4fc}
  .b-new{color:var(--accent);border-color:#eec1ac;background:#fdefe7}
  .chipcount{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:14px}
  /* clients */
  .clientcard{background:var(--card);border-radius:20px;box-shadow:var(--shadow);margin:12px 0;display:flex;
    align-items:center;gap:14px;padding:14px 16px;overflow:hidden;position:relative}
  .clientcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;border-radius:6px;background:var(--accent)}
  .mono{width:52px;height:52px;border-radius:50%;background:#eef0f4;display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#5b6470;font-size:16px}
  /* calendar */
  .calcard{background:var(--dark);color:#fff;border-radius:24px;padding:18px;margin:12px 0}
  .calhead{display:flex;align-items:center;margin-bottom:14px}
  .calhead .m{font-size:26px;font-weight:800}.calhead .y{font-size:26px;font-weight:800;color:#6b6b70;margin-left:6px}
  .caltoday{background:#2c2c2e;border-radius:999px;padding:7px 16px;font-weight:700;font-size:14px}
  .cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px 0;text-align:center}
  .cgrid .dow{color:#8a8a8e;font-size:12px;font-weight:600;padding-bottom:8px}
  .cgrid .d{padding:9px 0;font-size:16px;position:relative}
  .cgrid .d.out{color:#48484a}
  .cgrid .d .dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);display:flex;gap:3px}
  .cgrid .d .dot i{width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .cgrid .d .dot i.g{background:#6b6b70}
  .cgrid .d.today span{background:var(--accent);color:#fff;border-radius:50%;width:34px;height:34px;
    display:inline-flex;align-items:center;justify-content:center}
  .evrow{display:flex;gap:12px;font-size:15px;padding:9px 0;border-top:1px solid var(--line)}
  .evrow:first-child{border-top:0}
  .evrow .dt{color:var(--blue);font-weight:600;min-width:92px}
  .evrow .tm{color:var(--muted);min-width:64px}
  /* detail / sections */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:700;font-size:16px;margin:2px 0 8px}
  .stage{background:var(--card);border-radius:20px;box-shadow:var(--shadow);margin:12px 0;overflow:hidden}
  .stage .sh{display:flex;align-items:center;gap:12px;padding:15px 18px}
  .snum{width:30px;height:30px;border-radius:50%;background:var(--card2);color:var(--muted);font-weight:800;
    display:flex;align-items:center;justify-content:center;font-size:14px}
  .snum.done{background:var(--green);color:#fff}
  .snum.active{background:var(--accent);color:#fff}
  .stage .body{padding:0 18px 16px}
  .thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0}
  .thumb{aspect-ratio:1;border-radius:12px;background:#e9e8ea center/cover no-repeat;position:relative;overflow:hidden}
  .addph{aspect-ratio:1;border-radius:12px;border:2px dashed #d6d5d7;color:var(--muted);display:flex;
    align-items:center;justify-content:center;flex-direction:column;font-size:12px;gap:2px;background:var(--card2)}
  .assignrow{display:flex;align-items:center;gap:12px;padding:10px 0}
  .avatar{width:42px;height:42px;border-radius:50%;background:#eef0f4;color:#5b6470;font-weight:800;
    display:flex;align-items:center;justify-content:center}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;padding:12px 16px;
    font-weight:700;font-size:15px}
  .btn.primary{background:var(--accent);color:#fff;width:100%}
  .btn.ghost{background:var(--card2);color:var(--ink)}
  .doc{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .doc:first-child{border-top:0}
  .docico{width:40px;height:44px;border-radius:8px;background:#fdefe7;color:var(--accent);display:flex;
    align-items:center;justify-content:center;font-size:18px;font-weight:800}
  .seg{display:flex;background:var(--card2);border-radius:12px;padding:4px;gap:4px}
  .seg .o{flex:1;text-align:center;padding:8px;border-radius:9px;font-weight:600;font-size:14px;color:var(--muted)}
  .seg .o.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .kdot{width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block}
  label.fld{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:600}
  input.tf,textarea.tf{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font:inherit;background:var(--card2)}
  textarea.tf{min-height:70px;resize:vertical}
  .chk{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:15px;border-top:1px solid var(--line)}
  .chk:first-child{border-top:0}
  .chk .box{width:22px;height:22px;border-radius:7px;border:2px solid #cfced0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .chk.on .box{background:var(--green);border-color:var(--green)}
  /* tab bar */
  .tabbar{position:fixed;left:12px;right:12px;bottom:calc(8px + env(safe-area-inset-bottom));max-width:496px;margin:0 auto;
    padding:8px 6px;display:flex;justify-content:space-around;background:#fff;border-radius:28px;box-shadow:0 10px 30px rgba(0,0,0,.13)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:#9a9aa0;font-size:11px;font-weight:600;flex:1;padding:2px 0}
  .tab .ic{width:54px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:12px}
  .tab .ic svg{width:24px;height:24px;display:block}
  .tab.on{color:var(--accent)}
  .tab.on .ic{background:#fbe3d7}
  .hide{display:none!important}
  .toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;z-index:80;box-shadow:0 8px 20px rgba(0,0,0,.25);opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;bottom:112px}
  .demoTag{position:fixed;top:8px;right:8px;background:rgba(28,28,30,.8);color:#fff;font-size:10px;font-weight:700;
    padding:4px 9px;border-radius:999px;letter-spacing:.05em;z-index:90}
  /* check-measure */
  .cmh{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 2px}
  .cmsub{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:15px 0 2px}
  .specrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .specrow .k{color:var(--muted);font-size:14px}
  .specrow .v{margin-left:auto;border:0;background:transparent;text-align:right;font:inherit;color:var(--ink);font-weight:600;width:58%}
  .svc{display:flex;align-items:center;gap:8px;font-size:14px;padding:8px 0;border-top:1px solid var(--line)}
  .svc .pos{color:var(--muted);margin-left:auto;text-align:right;max-width:52%}
  .addrow{color:var(--accent);font-weight:700;font-size:14px;padding:10px 0 2px}
  .diag{margin:12px 0 4px;background:var(--card2);border-radius:14px;padding:12px 8px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.2s;z-index:70}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:var(--card);
    border-radius:22px 22px 0 0;padding:16px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(115%);
    transition:transform .25s;z-index:75;box-shadow:0 -12px 34px rgba(0,0,0,.16);max-height:84vh;overflow:auto}
  .sheet.open{transform:translateY(0)}
  .pickrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
  .pickrow:first-child{border-top:0}
  .warn{color:var(--accent);font-weight:700}
  .free{color:var(--green);font-size:13px;font-weight:700}
  .busy{color:var(--amber);font-size:13px;font-weight:700}
  .grab{width:40px;height:5px;background:#d8d7d9;border-radius:3px;margin:0 auto 12px}
  .mcal{background:var(--card2);border-radius:14px;padding:12px 8px}
  .mcal .g{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:4px 0}
  .mcal .dow{color:var(--muted);font-size:11px;font-weight:700;padding-bottom:6px}
  .mcal .d{padding:8px 0;font-size:15px;border-radius:10px;position:relative}
  .mcal .d.out,.mcal .d.we{color:#c9c8ca}
  .mcal .d.free{cursor:pointer;font-weight:600}
  .mcal .d.busy{color:var(--amber)}
  .mcal .d.busy::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--amber)}
  .mcal .d.sel{background:var(--accent);color:#fff;font-weight:800}
  .plansheet{background:#fff;border:1px solid #d8d7d9;border-radius:10px;padding:16px;box-shadow:var(--shadow)}
  .plantitle{font-weight:800;letter-spacing:.08em;font-size:12px;color:var(--muted);border-bottom:2px solid var(--ink);padding-bottom:6px;margin-bottom:12px}
  .plandiag{border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:12px}
  .planspecs{font-size:13px;line-height:1.8;margin-bottom:12px}
  .titleblock{border:1px solid var(--ink);border-radius:6px;padding:10px;font-size:13px}
  .sw{width:34px;height:34px;border-radius:8px;border:1px solid var(--line)}
  .tradeic{width:38px;height:38px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  /* dark mode — lighter iOS-style grey, not pure black */
  body.theme-dark{--bg:#1c1c1e;--card:#2c2c2e;--card2:#3a3a3c;--ink:#f2f2f7;--muted:#9a9aa0;--line:#3a3a3c;--shadow:0 8px 24px rgba(0,0,0,.4)}
  body.theme-dark .tabbar{background:#2c2c2e;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  body.theme-dark .icoBtn{background:#2c2c2e}
  body.theme-dark .seg .o.on{background:#54545a;color:#fff}
  body.theme-dark .pill.on{background:#54545a;color:#fff}
  body.theme-dark .avatar,body.theme-dark .mono,body.theme-dark .tradeic{background:#48484a;color:#e5e5ea}
  body.theme-dark .thumb{background:#3a3a3c}
  body.theme-dark .addph{border-color:#4a4a4c}
  body.theme-dark .stat.dark,body.theme-dark .calcard{background:#000}
  body.theme-dark .toast{background:#3a3a3c;color:#fff}
  body.theme-dark .docico{background:#3a2418}
  body.theme-dark .b-conf{background:#12351f}
  body.theme-dark .b-prog{background:#3a2f14}
  body.theme-dark .b-sched{background:#16283f}
  body.theme-dark .b-new{background:#3a2114}
  body.theme-dark .tf,body.theme-dark input,body.theme-dark select,body.theme-dark textarea{background:#3a3a3c;color:#f2f2f7;border-color:#4a4a4c}
</style>
</head>

// Build a simple top-down plan from the wall runs (turns 90° at each corner).
function areaDiagram(a){
  const walls=(a.walls||[]).map(w=>({id:w.id,len:parseInt(String(w.len).replace(/[^0-9]/g,''))||1000}));
  if(!walls.length) return '';
  const dirs=[[1,0],[0,-1],[-1,0],[0,1]]; // right, up, left, down
  let x=0,y=0; const pts=[{x,y}], segs=[];
  walls.forEach((w,idx)=>{const d=dirs[idx%4];const nx=x+d[0]*w.len,ny=y+d[1]*w.len;segs.push({a:{x,y},b:{x:nx,y:ny},len:w.len,id:w.id,dir:d});x=nx;y=ny;pts.push({x,y});});
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const W=(maxX-minX)||1000,H=(maxY-minY)||1000,pad=40,vw=320,vh=200;
  const s=Math.min((vw-2*pad)/W,(vh-2*pad)/H);
  const ox=(vw-W*s)/2-minX*s, oy=(vh-H*s)/2-minY*s;
  const tx=p=>ox+p.x*s, ty=p=>oy+p.y*s;
  const cx=pts.reduce((n,p)=>n+tx(p),0)/pts.length, cy=pts.reduce((n,p)=>n+ty(p),0)/pts.length;
  let svg=`<svg viewBox="0 0 ${vw} ${vh}" width="100%" style="display:block">`;
  if(pts.length>2) svg+=`<polygon points="${pts.map(p=>tx(p).toFixed(1)+','+ty(p).toFixed(1)).join(' ')}" fill="#fbeee7"/>`;
  segs.forEach(seg=>{
    svg+=`<line x1="${tx(seg.a).toFixed(1)}" y1="${ty(seg.a).toFixed(1)}" x2="${tx(seg.b).toFixed(1)}" y2="${ty(seg.b).toFixed(1)}" stroke="#1c1c1e" stroke-width="6" stroke-linecap="round"/>`;
    const mx=(tx(seg.a)+tx(seg.b))/2, my=(ty(seg.a)+ty(seg.b))/2, off=16, perp=[seg.dir[1],-seg.dir[0]];
    let lx=mx+perp[0]*off, ly=my+perp[1]*off;
    if(Math.hypot(lx-cx,ly-cy)<Math.hypot(mx-cx,my-cy)){lx=mx-perp[0]*off;ly=my-perp[1]*off;}
    svg+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" fill="#8a8a8e" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle">${seg.id} · ${seg.len}</text>`;
  });
  svg+='</svg>';
  return svg;
}

function rangeHasBusy(code,a,b){const bs=busySet(code);for(let d=a;d<=b;d++)if(bs.has(d))return true;return false;}
function selectDay(d){
  const p=pickerState;
  if(p.start==null||p.end!=null){p.start=d;p.end=null;}
  else if(d<p.start){p.start=d;}
  else if(d>p.start){ if(rangeHasBusy(p.installer,p.start,d)){toast('That span crosses a booked day');return;} p.end=d; }
  renderPicker();
}
function installerCalendar(code,start,end){
  const busy=busySet(code);
  const inSel=d=>start!=null&&(end!=null?(d>=start&&d<=end):d===start);
  let cells='<div class="d out">29</div><div class="d out">30</div>';
  for(let d=1;d<=31;d++){const dow=(2+(d-1))%7,we=dow>=5,bz=busy.has(d);
    const cls='d '+(inSel(d)?'sel':(we?'we':(bz?'busy':'free')));
    cells+=`<div class="${cls}" ${(!we&&!bz)?`onclick="selectDay(${d})"`:''}>${d}</div>`;}
  cells+='<div class="d out">1</div><div class="d out">2</div>';
  return `<div class="mcal"><div class="g"><div class="dow">M</div><div class="dow">T</div><div class="dow">W</div><div class="dow">T</div><div class="dow">F</div><div class="dow">S</div><div class="dow">S</div>${cells}</div></div>`;
}

  const days=start?(end?end-start+1:1):0;
  $('#sheet').innerHTML=`<div class="grab"></div>
    <b style="font-size:19px">Assign installer</b>
    <div class="muted" style="font-size:14px;margin:2px 0 8px">${esc(j.ref)} ${esc(j.client)} · ${esc(j.addr)}</div>
    <div class="cmsub">Installer</div>
    <div class="filters" style="padding:6px 0 4px">${chips}</div>
    <div class="cmsub">${esc(ins.name)}'s availability — July 2026</div>
    ${installerCalendar(code,start,end)}
    <div class="row" style="margin-top:8px;font-size:13px"><span class="free">● available</span><span class="busy" style="margin-left:16px">● booked</span><span class="muted" style="margin-left:auto">Tap start → end day</span></div>
    <button class="btn primary" style="margin-top:14px${start?'':';opacity:.5'}" onclick="confirmBooking()">${start?('Book '+esc(ins.name)+' — '+rangeLabel(start,end)+(days>1?(' · '+days+' days'):'')):'Pick day(s) above'}</button>
    <button class="btn ghost" style="width:100%;margin-top:8px" onclick="closeSheet()">Cancel</button>`;
}
function confirmBooking(){
  const {job:i,installer:code,start,end}=pickerState; if(!start){toast('Pick a start day');return;}
  const days=end?end-start+1:1;
  JOBS[i].installer=code; JOBS[i].date=rangeLabel(start,end); JOBS[i].days=days;
  JOBS[i].time=days>1?('On site '+days+' days'):'07:00–16:00';
  if(JOBS[i].status==='new')JOBS[i].status='sched';
  INSTALLER_BUSY[code]=INSTALLER_BUSY[code]||[];
  for(let d=start;d<=(end||start);d++){const iso='2026-07-'+String(d).padStart(2,'0');if(!INSTALLER_BUSY[code].includes(iso))INSTALLER_BUSY[code].push(iso);}
  closeSheet(); toast(installer(code).name+' booked · '+rangeLabel(start,end)); render();
}
function viewInstallSchedule(){
  return `<div class="wrap">
    <div class="back" onclick="go('jobs')">‹ Jobs</div>
    <h2>Install schedule</h2>
    <div class="sub">Book installers onto jobs and see each installer's load.</div>
    <div class="cmsub">Installers — this week</div>
    ${TEAM.installers.map(ins=>`<div class="assignrow"><div class="avatar">${ins.initials}</div><div style="flex:1"><div style="font-weight:700">${esc(ins.name)}</div><div class="muted" style="font-size:13px">${installerLoad(ins.code)} job(s) booked</div></div><span class="badge ${installerLoad(ins.code)?'b-conf':'b-new'}">${installerLoad(ins.code)?'On schedule':'Available'}</span></div>`).join('')}
    <div class="cmsub" style="margin-top:16px">Jobs</div>
    ${JOBS.map((j,i)=>{const ins=installer(j.installer);return `<div class="job">
      <div class="row"><h3 style="flex:1;font-size:18px">${esc(j.ref)} ${esc(j.client)}</h3>${badge(j.status)}</div>
      <div class="line">📅 ${j.installer?esc(j.date)+' · '+esc(j.time):'<span class="warn">Not scheduled</span>'}</div>
      <div class="line">📍 ${esc(j.addr)}</div>
      <div class="row" style="margin-top:10px">
        ${ins?`<div class="avatar" style="width:34px;height:34px;font-size:13px">${ins.initials}</div><div style="font-weight:700">${esc(ins.name)}</div>`:'<div class="muted">No installer yet</div>'}
        <span class="spacer"></span>
        <button class="pill accent on" onclick="openInstallerPicker(${i})">${ins?'Reassign':'Assign installer'}</button>
      </div>
    </div>`;}).join('')}
    <div style="height:8px"></div>
  </div>`;
}

/* ---- drafting & design ---- */
const DF_TEMPLATE={ status:'review', revisions:[
  {rev:'A',date:'24 Jun',note:'Initial concept from check-measure',state:'superseded'},
  {rev:'B',date:'27 Jun',note:'Client tweaks — island moved 100mm',state:'superseded'},
  {rev:'C',date:'1 Jul',note:'Appliance updates + benchtop overhang',state:'current'}
], drawings:[] };
let dfState={};
function dfGet(i){if(!dfState[i])dfState[i]=JSON.parse(JSON.stringify(DF_TEMPLATE));return dfState[i];}
function drafterLoad(code){return JOBS.filter(j=>j.drafter===code).length;}
function openDrafterPicker(i){$('#sheet').innerHTML=`<div class="grab"></div><b style="font-size:19px">Assign draftsperson</b>
  <div class="muted" style="font-size:14px;margin:2px 0 8px">${esc(JOBS[i].ref)} ${esc(JOBS[i].client)}</div>
  ${TEAM.drafters.map(d=>`<div class="pickrow" onclick="pickDrafter(${i},'${d.code}')"><div class="avatar">${d.initials}</div><div style="flex:1"><div style="font-weight:700">${esc(d.name)}</div><div class="muted" style="font-size:13px">${drafterLoad(d.code)} job(s) in drafting</div></div>${JOBS[i].drafter===d.code?'<span style="color:var(--accent);font-weight:800">✓</span>':''}</div>`).join('')}
  <button class="btn ghost" style="width:100%;margin-top:14px" onclick="closeSheet()">Cancel</button>`;openSheet();}
function pickDrafter(i,code){JOBS[i].drafter=code;dfGet(i);closeSheet();toast(drafter(code).name+' assigned to drafting');render();}
function dfSetStatus(i,s){dfGet(i).status=s;render();}
function dfAddRevision(i){const df=dfGet(i);df.revisions.forEach(r=>{if(r.state==='current')r.state='superseded';});const nx=String.fromCharCode(65+df.revisions.length);df.revisions.push({rev:nx,date:'Today',note:'New revision',state:'current'});toast('Rev '+nx+' added');render();}
function dfAddDrawing(i,input){const df=dfGet(i);[...input.files].forEach(f=>df.drawings.push(f.name));toast(input.files.length+' drawing(s) uploaded');render();}
function dfSend(i){dfGet(i).status='review';toast('Sent to '+esc(JOBS[i].client)+' for sign-off');go('client',i);}
function viewDrafting(i){
  const j=JOBS[i],df=dfGet(i),d=drafter(j.drafter),st=df.status;
  return `<div class="wrap">
    <div class="back" onclick="go('job',${i})">‹ ${esc(j.ref)} ${esc(j.client)}</div>
    <h2>Drafting &amp; design</h2>
    <div class="muted" style="margin-bottom:4px">${esc(j.ref)} ${esc(j.client)} · ${esc(j.builder)}</div>
    <div class="card"><b>Draftsperson</b>
      ${d?`<div class="assignrow"><div class="avatar">${d.initials}</div><div style="flex:1"><div style="font-weight:700">${esc(d.name)}</div><div class="muted" style="font-size:13px">${drafterLoad(j.drafter)} job(s) in drafting</div></div></div>`:'<div class="muted" style="padding:6px 0">Not assigned.</div>'}
      <button class="btn ghost" style="width:100%;margin-top:6px" onclick="openDrafterPicker(${i})">${d?'Reassign draftsperson':'Assign draftsperson'}</button>
    </div>
    <div class="card"><b>Site check-measure</b><div class="muted" style="font-size:13px;margin:2px 0 8px">${cmGet(i).areas.length} areas · ${cmPhotoCount(i)} photos · measured by ${esc(cmGet(i).measuredBy||'site')}</div><button class="btn ghost" style="width:100%" onclick="go('checkmeasure',${i})">View measurements &amp; photos ›</button></div>
    <div class="card"><b>Design status</b>
      <div class="seg" style="margin-top:10px">
        <div class="o ${st==='drafting'?'on':''}" onclick="dfSetStatus(${i},'drafting')">Drafting</div>
        <div class="o ${st==='review'?'on':''}" onclick="dfSetStatus(${i},'review')">Client review</div>
        <div class="o ${st==='approved'?'on':''}" onclick="dfSetStatus(${i},'approved')">Approved</div>
      </div>
    </div>
    <div class="card"><b>Revisions</b><div class="muted" style="font-size:13px;margin:2px 0 4px">Newest first.</div>
      ${df.revisions.slice().reverse().map(r=>`<div class="doc"><div class="docico">${esc(r.rev)}</div><div style="flex:1"><div style="font-weight:700">Rev ${esc(r.rev)} <span class="muted" style="font-weight:500">· ${esc(r.date)}</span></div><div class="muted" style="font-size:13px">${esc(r.note)}</div></div><span class="badge ${r.state==='superseded'?'b-new':'b-conf'}" style="font-size:11px">${r.state==='current'?'Current':(r.state==='approved'?'Approved':'Superseded')}</span></div>`).join('')}
      <div class="addrow" onclick="dfAddRevision(${i})">＋ new revision</div>
    </div>
    <div class="card"><b>Drawing set</b><div class="muted" style="font-size:13px;margin:2px 0 8px">Built from the check-measure — ${cmGet(i).areas.length} areas.</div>
      ${df.drawings.length?df.drawings.map(n=>`<div class="doc"><div class="docico">PDF</div><div style="flex:1;font-weight:600">${esc(n)}</div><span class="muted">⤓</span></div>`).join(''):'<div class="muted" style="font-size:14px;padding:4px 0">No drawings uploaded yet.</div>'}
      <label class="btn ghost" style="width:100%;margin-top:8px"><input type="file" accept="image/*,.pdf" multiple style="display:none" onchange="dfAddDrawing(${i},this)">⬆︎ Upload drawings</label>
    </div>
    <button class="btn primary" onclick="dfSend(${i})">Send to client for sign-off</button>
    <div class="muted" style="font-size:13px;text-align:center;margin:8px 4px 0">Shares the current Rev with ${esc(j.client)} in their portal.</div>
    <div style="height:8px"></div>
  </div>`;
}
function clientApprove(i){dfGet(i).status='approved';JOBS[i].stage=Math.max(JOBS[i].stage,2);toast('Design approved — sent to production');render();}

/* ---- documents hub ---- */
const DOC_CATS=[
  {cat:'Check-measure', files:[{t:'Check-measure notes.pdf',s:'1.1 MB · 22 Jun'}]},
  {cat:'Drawings & revisions', files:[{t:'Plan set — Rev C.pdf',s:'2.4 MB · 1 Jul'},{t:'Elevations — Rev C.pdf',s:'1.8 MB · 1 Jul'}]},
  {cat:'Appliance schedule', files:[{t:'Appliance schedule.pdf',s:'320 KB · 26 Jun'}]},
  {cat:'Benchtop template', files:[{t:'Benchtop template.pdf',s:'880 KB · 28 Jun'}]},
  {cat:'Sign-off', files:[]},
  {cat:'Completion report', files:[]}
];
let docState={};
function docGet(i){if(!docState[i])docState[i]=JSON.parse(JSON.stringify(DOC_CATS));return docState[i];}
function docAddFile(i,ci,input){const cats=docGet(i);[...input.files].forEach(f=>cats[ci].files.push({t:f.name,s:Math.round(f.size/1024)+' KB · Today'}));toast(input.files.length+' file(s) uploaded');render();}
function viewDocs(i){
  const j=JOBS[i],cats=docGet(i);
  return `<div class="wrap">
    <div class="back" onclick="go('job',${i})">‹ ${esc(j.ref)} ${esc(j.client)}</div>
    <h2>Documents</h2>
    <div class="muted" style="margin-bottom:4px">All plans, PDFs &amp; reports for this job.</div>
    ${cats.map((c,ci)=>`<div class="card"><div class="row"><b style="flex:1">${esc(c.cat)}</b><span class="muted" style="font-size:13px">${c.files.length} file(s)</span></div>
      ${c.files.length?c.files.map(f=>`<div class="doc"><div class="docico">PDF</div><div style="flex:1"><div style="font-weight:600">${esc(f.t)}</div><div class="muted" style="font-size:13px">${esc(f.s)}</div></div><span class="muted">⤓</span></div>`).join(''):'<div class="muted" style="font-size:14px;padding:6px 0">Nothing here yet.</div>'}
      <label class="addrow"><input type="file" multiple style="display:none" onchange="docAddFile(${i},${ci},this)">＋ upload</label>
    </div>`).join('')}
    <button class="btn primary" onclick="toast('Latest documents shared with client (demo)')">Share with client</button>
    <div style="height:8px"></div>
  </div>`;
}

/* ---------------- router ---------------- */
let state={tab:'jobs',arg:null};
const OFFICE_TABS=[['jobs','📋','Jobs'],['calendar','🗓️','Calendar'],['clients','👥','Clients'],['reports','📄','Reports'],['settings','☀️','Settings']];
const CLIENT_TABS=[['jobs','🏠','My kitchen'],['settings','☀️','Account']];
const ICONS={
  jobs:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4.5" width="14" height="16" rx="2.5"/><rect x="9" y="3" width="6" height="3.2" rx="1.2"/><path d="M8.5 11h7M8.5 14h7M8.5 17h4"/></svg>`,
  calendar:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5.5" width="16" height="14.5" rx="2.5"/><path d="M4 9.5h16M8 3.5v3.4M16 3.5v3.4"/></svg>`,
  clients:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8.5" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M15.8 6.4a2.6 2.6 0 0 1 0 5.2"/><path d="M17 14.2a5 5 0 0 1 3.5 4.8"/></svg>`,
  reports:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3.5h6l4.5 4.5V19a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5.5a2 2 0 0 1 2-2z"/><path d="M13 3.5V8h4.5"/><path d="M9 12.5h6M9 15.5h6"/></svg>`,
  settings:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.3"/><path d="M12 3.5v2.2M12 18.3v2.2M4.6 12h2.2M17.2 12h2.2M6.6 6.6l1.6 1.6M15.8 15.8l1.6 1.6M17.4 6.6l-1.6 1.6M8.2 15.8l-1.6 1.6"/></svg>`
};
const STAFF_TABS=[['jobs','📋','My jobs'],['calendar','🗓️','Calendar'],['settings','☀️','Account']];
function go(tab,arg){state={tab,arg:arg??null};window.scrollTo(0,0);render();}
function render(){
  const t=state.tab;
  if(t==='job')app.innerHTML=viewJob(state.arg);
  else if(t==='checkmeasure')app.innerHTML=viewCheckMeasure(state.arg);
  else if(t==='installsched')app.innerHTML=viewInstallSchedule();
  else if(t==='drafting')app.innerHTML=viewDrafting(state.arg);
  else if(t==='docs')app.innerHTML=viewDocs(state.arg);
  else if(t==='client')app.innerHTML=viewClient(state.arg);
  else if(t==='plan')app.innerHTML=viewPlan(state.arg);
  else if(t==='installer')app.innerHTML=viewInstaller(state.arg);
  else if(t==='calendar')app.innerHTML=viewCalendar();
  else if(t==='clients')app.innerHTML=viewClients();
  else if(t==='reports')app.innerHTML=viewReports();
  else if(t==='settings')app.innerHTML=viewSettings();
  else app.innerHTML=(currentRole==='office')?viewJobs():(isClient()?viewClient(clientJobIndex()):(isDrafter()?viewDrafterHome(currentRole):viewInstallerHome(currentRole)));
  let activeTab;
  if(currentRole==='office') activeTab=['job','checkmeasure','installsched','drafting','docs'].includes(t)?'jobs':((t==='client'||t==='plan')?'clients':(t==='installer'?'reports':t));
  else activeTab=(t==='calendar')?'calendar':(t==='settings')?'settings':'jobs';
  const tabs=currentRole==='office'?OFFICE_TABS:(isClient()?CLIENT_TABS:STAFF_TABS);
  $('#tabbar').innerHTML=tabs.map(([k,ic,l])=>`<button class="tab ${activeTab===k?'on':''}" onclick="go('${k}')"><span class="ic">${ICONS[k]||ic}</span>${l}</button>`).join('');
}
function getProfile(){try{return JSON.parse(localStorage.getItem('mk_profile'))||{name:'André Meloni',role:'Owner / Admin'};}catch(e){return {name:'André Meloni',role:'Owner / Admin'};}}
function setProfile(k,v){const p=getProfile();p[k]=v;localStorage.setItem('mk_profile',JSON.stringify(p));}
function applyTheme(){const pref=localStorage.getItem('mk_theme')||'auto';const dark=pref==='dark'||(pref==='auto'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.body.classList.toggle('theme-dark',dark);}
function setTheme(p){localStorage.setItem('mk_theme',p);applyTheme();render();}
try{window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if((localStorage.getItem('mk_theme')||'auto')==='auto')applyTheme();});}catch(e){}
applyTheme();
render();
</script>
